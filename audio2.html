<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadro estilo Spotify</title>

<style>
    body {
        background-color: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .spotify-card {
        width: 250px;
        height: 250px;
        background-color: #181818;
        border-radius: 12px;
        padding: 20px;
        color: white;
        position: relative;
        transition: transform 0.3s ease;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .spotify-card:hover {
        transform: scale(1.05);
        background-color: #282828;
    }

    .album-cover {
        width: 100%;
        height: 150px;
        background-image: url('https://lyrics.lyricfind.com/_next/image?url=%2Fimages%2Fv2%2Fcover_art%2Fcuration%2Foriginal%2F2%2F8%2F2%2Ff%2F6332-197d-421d-8c50-62f3359ac99a.jpg&w=3840&q=75');
        background-size: cover;
        background-position: center;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    .title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .artist {
        font-size: 14px;
        color: #b3b3b3;
    }

    .play-button {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background-color: #1DB954;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        color: black;
        cursor: pointer;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .spotify-card:hover .play-button {
        opacity: 1;
        transform: translateY(0);
    }
</style>
</head>

<body>

<div class="spotify-card">
    <div class="album-cover"></div>
    <div class="title">Svag</div>
    <div class="artist">Victor Leksell</div>
    <div class="play-button" onclick="toggleAudio()">▶</div>
</div>

<!-- Audio oculto -->
<audio id="audio" src="Victor Leksell - Svag.mp3"></audio>

<script>
    const audio = document.getElementById("audio");
    const button = document.querySelector(".play-button");

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            button.innerHTML = "❚❚";
        } else {
            audio.pause();
            button.innerHTML = "▶";
        }
    }
</script>

</body>
</html>
